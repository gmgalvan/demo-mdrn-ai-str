name: Build and publish payment-api image

on:
  push:
    branches:
      - develop
    paths:
      - "payments_api/**"
      - ".github/workflows/build-payments-api.yml"
  pull_request:
    branches:
      - develop
    paths:
      - "payments_api/**"
      - ".github/workflows/build-payments-api.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: payment-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            payments_api/requirements.txt
            payments_api/requirements-dev.txt

      - name: Install dependencies
        working-directory: payments_api
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: payments_api
        run: pytest

  build:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=develop-${{ github.run_number }},enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,prefix=sha-

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ./payments_api
          file: ./payments_api/Dockerfile
          push: ${{ github.ref == 'refs/heads/develop' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
