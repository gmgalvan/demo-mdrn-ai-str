name: PR checks (*-base branches)

# `branches:` on a pull_request trigger filters by the PR's *target* branch,
# not the source one -- there's no native filter for "source branch matches
# a pattern". So this fires on every PR, and each job below gates itself
# with `if: endsWith(github.head_ref, '-base')` to only actually run when
# the PR's source branch name ends in "-base".
on:
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    if: endsWith(github.head_ref, '-base')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            payments_api/requirements.txt
            payments_api/requirements-dev.txt

      - name: Install dependencies
        working-directory: payments_api
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: payments_api
        run: pytest

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    if: endsWith(github.head_ref, '-base')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
