name: PR checks (*-base branches)

on:
  pull_request:
    branches:
      - "*-base"

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            payments_api/requirements.txt
            payments_api/requirements-dev.txt

      - name: Install dependencies
        working-directory: payments_api
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: payments_api
        run: pytest

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
