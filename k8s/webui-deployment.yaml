# webui: Angular frontend for payment-api, served by nginx.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: demo
  labels:
    app: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
      annotations:
        # Picked up by the "kubernetes-pods" Prometheus job (see
        # k8s/observability/prometheus.yaml); scrapes the exporter sidecar
        # below, not the webui container itself.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: webui
          image: webui:demo
          # Image is loaded into kind with `kind load`; never pull from a registry.
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PAYMENTS_API_URL
              value: http://payment-api.demo.svc.cluster.local
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
        # Translates nginx's built-in stub_status page (see
        # webui/nginx.conf.template) into Prometheus metrics: connections
        # and total requests. nginx has no app logic, so this is the
        # closest equivalent to payment-api's /metrics endpoint.
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.3.0
          args:
            - --nginx.scrape-uri=http://127.0.0.1:8080/stub_status
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
