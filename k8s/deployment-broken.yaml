# Broken deployment for Demo 2: the 16Mi memory limit is far below what
# a Python/FastAPI process needs to start, so the kernel OOM-kills the
# container on boot and the pod ends up in CrashLoopBackOff.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api-v2
  namespace: demo
  labels:
    app: payment-api-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api-v2
  template:
    metadata:
      labels:
        app: payment-api-v2
    spec:
      containers:
        - name: payment-api
          image: payment-api:demo
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "16Mi"
              cpu: "100m"
            limits:
              memory: "16Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
